<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>მიმტანების განრიგი</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14; --sf:#161920; --s2:#1c1f28; --s3:#22262f;
  --br:#252830; --br2:#2e3240;
  --ac:#f0a500; --ac2:#e05c2a; --tx:#e8eaf0; --mu:#5a5f70;
  --m-b:rgba(96,180,255,.14);  --m-c:#60b4ff;
  --a-b:rgba(240,165,0,.14);   --a-c:#f0a500;
  --e-b:rgba(224,92,42,.14);   --e-c:#e05c2a;
  --o-b:rgba(255,255,255,.03); --o-c:#3a3f52;
  --H-b:rgba(120,80,255,.16);  --H-c:#a78bfa;
  --V-b:rgba(20,200,130,.14);  --V-c:#34d399;
  --A-b:rgba(236,72,153,.14);  --A-c:#f472b6;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans Georgian',sans-serif;min-height:100vh;padding-bottom:60px;}

/* ── HEADER ── */
.hdr{background:var(--sf);border-bottom:1px solid var(--br);padding:14px 16px 10px;position:sticky;top:0;z-index:90;box-shadow:0 2px 12px rgba(0,0,0,.4);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.hdr h1{font-size:1.15rem;font-weight:900;letter-spacing:-.3px;}
.hdr h1 span{color:var(--ac);}
.hdr-sub{font-size:.68rem;color:var(--mu);margin-top:2px;text-transform:uppercase;letter-spacing:.07em;}
.leg{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.li{display:flex;align-items:center;gap:5px;font-size:.66rem;color:var(--mu);}
.ld{width:7px;height:7px;border-radius:50%;}
.sync-row{display:flex;align-items:center;gap:6px;margin-top:5px;}
.sd{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sd.ok{background:#34d399;} .sd.spin{background:var(--ac);animation:blink 1s infinite;} .sd.err{background:#f87171;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.st{font-size:.63rem;color:var(--mu);}
.abtn{background:var(--s2);border:1px solid var(--br);color:var(--mu);padding:7px 11px;
  border-radius:8px;font-family:inherit;font-size:.72rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.abtn:hover{border-color:var(--ac);color:var(--ac);}

/* ── WEEK GRID ── */
.wk-section{padding:10px 10px 0;}
.wk-nav{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.wk-nav-btn{background:var(--s2);border:1px solid var(--br);border-radius:8px;
  padding:6px 13px;font-family:inherit;font-size:.75rem;font-weight:700;color:var(--tx);cursor:pointer;transition:all .15s;}
.wk-nav-btn:hover{border-color:var(--ac);}
.wk-label{flex:1;text-align:center;font-size:.82rem;font-weight:800;color:var(--tx);}
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.wk-col{background:var(--sf);border:1px solid var(--br);border-radius:10px;overflow:hidden;}
.wk-col.today{border-color:var(--ac);}
.wk-col.today .wk-col-hdr{background:rgba(240,165,0,.1);}
.wk-col-hdr{padding:6px 4px 4px;text-align:center;background:var(--s2);}
.wk-dn{font-size:.55rem;font-weight:700;text-transform:uppercase;color:var(--mu);letter-spacing:.04em;}
.wk-dd{font-size:1.05rem;font-weight:900;line-height:1.1;}
.wk-dd.wknd{color:var(--ac2);}
.wk-dm{font-size:.52rem;color:var(--mu);}
.wk-entries{padding:4px 3px;display:flex;flex-direction:column;gap:3px;min-height:40px;}
.wk-entry{border-radius:6px;padding:3px 4px;font-size:.6rem;font-weight:700;line-height:1.3;}
.wk-ename{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wk-epos{font-size:.52rem;opacity:.85;}
.wk-empty{font-size:.58rem;color:var(--mu);text-align:center;padding:6px 0;}

/* ── VIEW TOGGLE ── */
.vtog{display:flex;gap:8px;padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--br);margin-top:8px;}
.vbtn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--br);background:var(--sf);
  color:var(--mu);font-family:inherit;font-size:.73rem;font-weight:700;cursor:pointer;transition:all .15s;}
.vbtn.active{background:var(--ac);color:#000;border-color:var(--ac);}

/* ── WAITER CARDS ── */
#vw{padding:10px 10px 0;}
.wcard{margin-bottom:8px;border-radius:12px;border:1px solid var(--br);overflow:hidden;background:var(--sf);}
.wcard-hdr{display:flex;align-items:center;padding:11px 13px;background:var(--s2);cursor:pointer;-webkit-tap-highlight-color:transparent;gap:10px;}
.wi{flex:1;min-width:0;}
.wn{font-size:.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wp{font-size:.7rem;color:var(--mu);margin-top:1px;}
.wbdg{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:120px;}
.bdg{font-size:.6rem;font-weight:700;padding:2px 5px;border-radius:20px;}
.bdg.m{background:var(--m-b);color:var(--m-c);}
.bdg.a{background:var(--a-b);color:var(--a-c);}
.bdg.e{background:var(--e-b);color:var(--e-c);}
.chv{width:16px;height:16px;color:var(--mu);flex-shrink:0;transition:transform .2s;}
.wcard.open .chv{transform:rotate(180deg);}
.wshifts{display:none;padding:8px;gap:5px;flex-wrap:wrap;}
.wcard.open .wshifts{display:flex;}
.chip{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1;min-width:40px;max-width:54px;padding:5px 2px;border-radius:8px;}
.chip .cd{font-size:.55rem;font-weight:700;color:var(--mu);text-transform:uppercase;}
.chip .cn{font-size:.8rem;font-weight:900;line-height:1;}
.chip .ct{font-size:.57rem;font-weight:700;}
.chip .cp{font-size:.52rem;font-weight:800;padding:1px 4px;border-radius:7px;margin-top:1px;}
.chip.wknd .cd{color:var(--ac2);}
.chip.m{background:var(--m-b);} .chip.m .cn,.chip.m .ct{color:var(--m-c);}
.chip.a{background:var(--a-b);} .chip.a .cn,.chip.a .ct{color:var(--a-c);}
.chip.e{background:var(--e-b);} .chip.e .cn,.chip.e .ct{color:var(--e-c);}
.chip.o{background:var(--o-b);} .chip.o .cn,.chip.o .ct{color:var(--o-c);}

/* ── DAY VIEW ── */
#vd{padding:10px;}
.dblk{margin-bottom:8px;border-radius:12px;border:1px solid var(--br);overflow:hidden;background:var(--sf);}
.dblk-hdr{display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--s2);}
.dbig{font-size:1.4rem;font-weight:900;line-height:1;}
.dbig.wknd{color:var(--ac2);}
.dmeta .dn{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);}
.dmeta .dm{font-size:.62rem;color:var(--mu);}
.dcnt{margin-left:auto;font-size:.66rem;color:var(--mu);}
.drow{display:flex;align-items:center;padding:8px 13px;border-top:1px solid var(--br);gap:8px;}
.drif{flex:1;min-width:0;}
.drn{font-size:.82rem;font-weight:600;}
.drp{font-size:.67rem;color:var(--mu);}
.drr{display:flex;gap:5px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
.drs{font-size:.68rem;font-weight:700;padding:3px 8px;border-radius:20px;}
.drs.m{background:var(--m-b);color:var(--m-c);}
.drs.a{background:var(--a-b);color:var(--a-c);}
.drs.e{background:var(--e-b);color:var(--e-c);}
.drs.o{background:var(--o-b);color:var(--o-c);}
.pc{font-size:.68rem;font-weight:800;padding:3px 8px;border-radius:20px;}
.pc.H{background:var(--H-b);color:var(--H-c);}
.pc.V{background:var(--V-b);color:var(--V-c);}
.pc.A{background:var(--A-b);color:var(--A-c);}
.dnote{font-size:.65rem;color:var(--mu);font-style:italic;padding:2px 13px 7px;border-top:none;}

/* ── OVERLAYS ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;
  align-items:flex-start;justify-content:center;padding:12px;overflow-y:auto;}
.ov.show{display:flex;}
.modal{background:var(--sf);border:1px solid var(--br);border-radius:16px;width:100%;max-width:520px;margin:auto;}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;
  border-bottom:1px solid var(--br);position:sticky;top:0;background:var(--sf);z-index:1;border-radius:16px 16px 0 0;}
.mhdr h2{font-size:.93rem;font-weight:800;}
.xbtn{background:none;border:none;color:var(--mu);font-size:1.2rem;cursor:pointer;padding:4px;line-height:1;}
.mbody{padding:16px 18px;}

/* LOGIN */
.lform{display:flex;flex-direction:column;gap:12px;}
.inp{background:var(--s2);border:1px solid var(--br);border-radius:8px;
  padding:10px 13px;color:var(--tx);font-family:inherit;font-size:.85rem;width:100%;outline:none;}
.inp:focus{border-color:var(--ac);}
.btn-p{background:var(--ac);color:#000;border:none;border-radius:8px;
  padding:11px;font-family:inherit;font-size:.85rem;font-weight:800;cursor:pointer;width:100%;}
.errmsg{color:#f87171;font-size:.75rem;text-align:center;min-height:18px;}

/* ADMIN TABS */
.atabs{display:flex;gap:6px;margin-bottom:16px;}
.atab{flex:1;padding:8px;border-radius:8px;border:1px solid var(--br);background:var(--s2);
  color:var(--mu);font-family:inherit;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .15s;}
.atab.active{background:var(--ac);color:#000;border-color:var(--ac);}

/* ADMIN GRID */
.ag-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.ag-nav-btn{background:var(--s2);border:1px solid var(--br);border-radius:7px;
  padding:5px 11px;font-family:inherit;font-size:.8rem;color:var(--tx);cursor:pointer;transition:all .15s;}
.ag-nav-btn:hover{border-color:var(--ac);}
.ag-label{flex:1;text-align:center;font-size:.85rem;font-weight:800;}
.ag-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--br);}
.ag-table{width:100%;border-collapse:collapse;min-width:480px;}
.ag-table thead th{background:var(--s2);padding:8px 6px;font-size:.63rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;color:var(--mu);border-bottom:1px solid var(--br);text-align:center;}
.ag-table thead th:first-child{text-align:left;padding-left:10px;min-width:100px;}
.ag-table tbody td{padding:5px 4px;border-bottom:1px solid var(--br);vertical-align:middle;text-align:center;}
.ag-table tbody td:first-child{text-align:left;padding-left:10px;}
.ag-table tbody tr:last-child td{border-bottom:none;}
.ag-table tbody tr:hover td{background:rgba(255,255,255,.015);}
.cn2{font-size:.75rem;font-weight:700;}
.cp2{font-size:.62rem;color:var(--mu);}
.th-date{display:flex;flex-direction:column;align-items:center;gap:1px;}
.th-d{font-size:.9rem;font-weight:900;color:var(--tx);}
.th-d.wknd{color:var(--ac2);}
.th-w{font-size:.58rem;color:var(--mu);}
.gsel{background:var(--s2);border:1px solid var(--br);border-radius:6px;
  padding:4px 5px;color:var(--tx);font-family:inherit;font-size:.67rem;font-weight:700;
  cursor:pointer;outline:none;width:100%;transition:border-color .15s;}
.gsel:focus{border-color:var(--ac);}
.ginp{background:var(--s2);border:1px solid var(--br);border-radius:6px;
  padding:3px 5px;color:var(--tx);font-family:inherit;font-size:.63rem;width:100%;outline:none;}
.ginp:focus{border-color:var(--ac);}
.gcell{display:flex;flex-direction:column;gap:3px;padding:2px;}
.off-cell{color:var(--o-c);font-size:.65rem;font-weight:600;text-align:center;padding:4px 0;}
.flash{animation:flashG .5s ease;}
@keyframes flashG{0%{background:rgba(52,211,153,.25);}100%{background:transparent;}}
.save-row{display:flex;align-items:center;justify-content:flex-end;margin-top:12px;gap:10px;}
.sstt{font-size:.72rem;color:var(--V-c);}
.sbtn{background:var(--V-c);color:#000;border:none;border-radius:8px;
  padding:9px 20px;font-family:inherit;font-size:.78rem;font-weight:800;cursor:pointer;transition:opacity .15s;}
.sbtn:hover{opacity:.9;}
.sbtn:disabled{opacity:.5;cursor:not-allowed;}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.cal-nav-btn{background:var(--s2);border:1px solid var(--br);border-radius:7px;
  padding:5px 11px;font-family:inherit;font-size:.8rem;color:var(--tx);cursor:pointer;}
.cal-mo{flex:1;text-align:center;font-size:.85rem;font-weight:800;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px;}
.cc{text-align:center;padding:6px 2px;border-radius:7px;font-size:.75rem;font-weight:600;
  cursor:pointer;border:2px solid transparent;transition:all .12s;position:relative;user-select:none;}
.cc.head{color:var(--mu);font-size:.63rem;font-weight:700;text-transform:uppercase;cursor:default;padding:3px;}
.cc.other{color:var(--mu);opacity:.35;cursor:default;}
.cc.wknd-c{color:var(--ac2);}
.cc.today-c{border-color:var(--ac);}
.cc.has-dot::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--V-c);
  position:absolute;bottom:2px;left:50%;transform:translateX(-50%);}
.cc:not(.head):not(.other):hover{background:var(--s3);}
.cc.active-c{background:rgba(240,165,0,.15);border-color:var(--ac);}
.cal-detail{background:var(--s2);border-radius:10px;padding:12px 14px;}
.cal-detail-ttl{font-size:.8rem;font-weight:800;margin-bottom:10px;color:var(--tx);}
.cal-drow{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--br);gap:8px;}
.cal-drow:last-child{border-bottom:none;}
.cal-dn{flex:1;font-size:.8rem;font-weight:600;}
.cal-dr{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}

/* DESKTOP */
@media(min-width:720px){
  body{padding:24px 16px 60px;}
  .hdr{position:static;border-radius:14px 14px 0 0;border:1px solid var(--br);border-bottom:none;
    max-width:1340px;margin:0 auto;padding:18px 22px 14px;box-shadow:none;}
  .hdr h1{font-size:1.6rem;}
  .wk-section{max-width:1340px;margin:0 auto;padding:0;border:1px solid var(--br);border-top:none;
    border-bottom:none;background:var(--sf);}
  .wk-nav{padding:12px 16px 0;}
  .wk-grid{padding:8px 16px 12px;gap:6px;}
  .wk-col{min-height:130px;}
  .wk-entry{font-size:.66rem;}
  .vtog{display:none;}
  #vw,#vd{display:none!important;}
  #dtbl{display:block;}
  .twrap{max-width:1340px;margin:0 auto;overflow-x:auto;border:1px solid var(--br);
    border-top:none;border-radius:0 0 14px 14px;background:var(--sf);}
  table{width:100%;border-collapse:collapse;min-width:940px;}
  thead th{background:var(--bg);padding:8px 5px;font-size:.62rem;font-weight:700;
    letter-spacing:.07em;text-transform:uppercase;color:var(--mu);border-bottom:1px solid var(--br);text-align:center;}
  thead th:first-child{text-align:left;padding-left:16px;min-width:185px;}
  .thn{font-size:.93rem;font-weight:900;color:var(--tx);display:block;}
  .thn.wknd{color:var(--ac2);}
  tbody tr{border-bottom:1px solid var(--br);}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:rgba(255,255,255,.02);}
  td{padding:0;text-align:center;vertical-align:middle;}
  td:first-child{text-align:left;padding:9px 10px 9px 16px;}
  .tn{font-size:.82rem;font-weight:600;}
  .tph{font-size:.68rem;color:var(--mu);margin-top:1px;}
  .tc{display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:54px;font-size:.7rem;font-weight:700;gap:3px;}
  .tc.m{background:var(--m-b);color:var(--m-c);}
  .tc.a{background:var(--a-b);color:var(--a-c);}
  .tc.e{background:var(--e-b);color:var(--e-c);}
  .tc.o{background:var(--o-b);color:var(--o-c);font-size:.6rem;letter-spacing:.07em;}
  .tp{font-size:.58rem;font-weight:800;padding:2px 5px;border-radius:7px;}
  .srow td{padding:0;}
  .scl{height:30px;display:flex;align-items:center;justify-content:center;
    font-size:.64rem;color:var(--mu);background:var(--bg);border-top:1px solid var(--br);
    flex-direction:column;gap:1px;}
  .scl .sc{font-size:.88rem;color:var(--tx);font-weight:700;}
}
#dtbl{display:none;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div>
      <h1>მიმტანების <span>განრიგი</span></h1>
      <div class="hdr-sub" id="hdrSub">იტვირთება...</div>
    </div>
    <button class="abtn" onclick="openAdmin()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Admin
    </button>
  </div>
  <div class="leg">
    <div class="li"><div class="ld" style="background:var(--m-c)"></div>09:00</div>
    <div class="li"><div class="ld" style="background:var(--a-c)"></div>14:00</div>
    <div class="li"><div class="ld" style="background:var(--e-c)"></div>15:00</div>
    <div class="li"><div class="ld" style="background:#3a3f52;border:1px solid #3a3f52"></div>OFF</div>
    <div class="li"><div class="ld" style="background:var(--H-c)"></div>ჰოლი</div>
    <div class="li"><div class="ld" style="background:var(--V-c)"></div>ვერანდა</div>
    <div class="li"><div class="ld" style="background:var(--A-c)"></div>ანტრ.</div>
  </div>
  <div class="sync-row">
    <span class="sd spin" id="sd"></span>
    <span class="st" id="st">სინქრონიზაცია...</span>
  </div>
</div>

<!-- WEEK GRID -->
<div class="wk-section">
  <div class="wk-nav">
    <button class="wk-nav-btn" onclick="shiftWeek(-1)">◀</button>
    <div class="wk-label" id="wkLabel">—</div>
    <button class="wk-nav-btn" onclick="shiftWeek(1)">▶</button>
  </div>
  <div class="wk-grid" id="wkGrid"></div>
</div>

<!-- VIEW TOGGLE (mobile) -->
<div class="vtog">
  <button class="vbtn active" onclick="sview('w',this)">მიმტანით</button>
  <button class="vbtn" onclick="sview('d',this)">დღით</button>
</div>

<!-- WAITER CARDS -->
<div id="vw"></div>
<!-- DAY VIEW -->
<div id="vd" style="display:none"></div>
<!-- DESKTOP TABLE -->
<div id="dtbl"><div class="twrap"><table><thead id="dth"></thead><tbody id="dtb"></tbody></table></div></div>

<!-- LOGIN -->
<div class="ov" id="loginOv">
  <div class="modal">
    <div class="mhdr"><h2>🔐 Admin შესვლა</h2><button class="xbtn" onclick="cov('loginOv')">✕</button></div>
    <div class="mbody">
      <div class="lform">
        <input type="password" class="inp" id="passInp" placeholder="პაროლი" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="btn-p" onclick="doLogin()">შესვლა</button>
        <div class="errmsg" id="lerr"></div>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div class="ov" id="adminOv">
  <div class="modal">
    <div class="mhdr"><h2>⚙️ Admin პანელი</h2><button class="xbtn" onclick="cov('adminOv')">✕</button></div>
    <div class="mbody">
      <div class="atabs">
        <button class="atab active" onclick="aTab('grid',this)">📋 კვირის ცხრილი</button>
        <button class="atab" onclick="aTab('cal',this)">📅 კალენდარი</button>
      </div>

      <!-- GRID TAB -->
      <div id="aGrid">
        <div class="ag-nav">
          <button class="ag-nav-btn" onclick="agWeek(-1)">◀</button>
          <div class="ag-label" id="agLabel">—</div>
          <button class="ag-nav-btn" onclick="agWeek(1)">▶</button>
        </div>
        <div class="ag-wrap">
          <table class="ag-table" id="agTable"></table>
        </div>
        <div class="save-row">
          <span class="sstt" id="sstt"></span>

══════════════════════════════ */
const dk  = (y,m,d) => `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const pk  = (name,datekey) => `${name}|${datekey}`;
const iW  = wd => wd===0||wd===6;
function scls(v){
  if(!v||v==='OFF')return'o';
  if(v==='09:00')return'm'; if(v==='14:00')return'a'; if(v==='15:00')return'e';
  return'o';
}
function lbl(v){return(!v||v==='OFF')?'OFF':v;}

function weekDates(off){
  const t=new Date(), wd=t.getDay();
  const sun=new Date(t); sun.setDate(t.getDate()-wd+off*7);
  return Array.from({length:7},(_,i)=>{
    const d=new Date(sun); d.setDate(sun.getDate()+i);
    return {y:d.getFullYear(),m:d.getMonth()+1,d:d.getDate(),wd:d.getDay()};
  });
}

function wkLabel(days){
  const f=days[0],l=days[6];
  if(f.m===l.m) return `${f.d}–${l.d} ${MSH[f.m-1]} ${f.y}`;
  return `${f.d} ${MSH[f.m-1]} – ${l.d} ${MSH[l.m-1]} ${l.y}`;
}

function todayDk(){
  const t=new Date();
  return dk(t.getFullYear(),t.getMonth()+1,t.getDate());
}

// get shift for a waiter on a date (DB overrides hardcoded)
function getShift(name,y,m,d){
  const key=pk(name,dk(y,m,d));
  if(DB[key]?.shift_time) return DB[key].shift_time;
  const i=FCOLS.findIndex(c=>c.y===y&&c.m===m&&c.d===d);
  if(i>=0){ const w=WAITERS.find(w=>w.name===name); return w?w.shifts[i]:'OFF'; }
  return 'OFF';
}
function getPos(name,y,m,d){ return DB[pk(name,dk(y,m,d))]?.position||''; }
function getNote(name,y,m,d){ return DB[pk(name,dk(y,m,d))]?.notes||''; }

/* ══════════════════════════════
   SUPABASE
══════════════════════════════ */
async function sbq(path,opts={}){
  const h={
    'apikey':KEY,
    'Authorization':'Bearer '+KEY,
    'Content-Type':'application/json',
    'Prefer':'return=representation'
  };
  if(opts.headers) Object.assign(h, opts.headers);
  const r=await fetch(SB+'/rest/v1/'+path,{...opts, headers:h});
  const t=await r.text();
  if(!r.ok) throw new Error(t);
  return t?JSON.parse(t):null;
}

async function loadDB(){
  setSS('spin','ჩატვირთვა...');
  try{
    const rows=await sbq('waiter_positions?select=waiter_name,shift_date,shift_time,position,notes');
    DB={};
    (rows||[]).forEach(r=>{
      DB[pk(r.waiter_name,r.shift_date)]={
        shift_time:r.shift_time||'',
        position:r.position||'',
        notes:r.notes||''
      };
    });
    setSS('ok','სინქრონიზებულია');
    renderAll();
  }catch(e){
    setSS('err','შეცდომა: '+e.message.slice(0,40));
  }
}

async function upsertRows(rows){
  return sbq('waiter_positions',{
    method:'POST',
    headers:{'Prefer':'resolution=merge-duplicates,return=representation'},
    body:JSON.stringify(rows)
  });
}

async function saveGrid(){
  const btn=document.getElementById('saveBtn');
  const sstt=document.getElementById('sstt');
  btn.disabled=true; btn.textContent='⏳...'; sstt.textContent='';

  // collect all values from the grid
  const map={};
  document.querySelectorAll('#agTable .gsel, #agTable .ginp').forEach(el=>{
    const key=pk(el.dataset.n, el.dataset.dk);
    if(!map[key]) map[key]={waiter_name:el.dataset.n, shift_date:el.dataset.dk};
    if(el.dataset.t==='s') map[key].shift_time=el.value;
    if(el.dataset.t==='p') map[key].position=el.value||null;
    if(el.dataset.t==='n') map[key].notes=el.value||null;
  });

  const rows=Object.values(map);
  if(!rows.length){ btn.disabled=false; btn.textContent='💾 შენახვა'; return; }

  try{
    await upsertRows(rows);
    // update local cache
    rows.forEach(r=>{
      DB[pk(r.waiter_name,r.shift_date)]={
        shift_time:r.shift_time||'',
        position:r.position||'',
        notes:r.notes||''
      };
    });
    // flash
    document.querySelectorAll('#agTable tbody tr').forEach(tr=>{
      tr.classList.add('flash');
      setTimeout(()=>tr.classList.remove('flash'),500);
    });
    sstt.textContent='✓ შენახულია';
    setSS('ok','შენახულია');
    renderAll();
  }catch(e){
    sstt.textContent='⚠️ '+e.message.slice(0,50);
    setSS('err','შეცდომა');
  }
  btn.disabled=false; btn.textContent='💾 შენახვა';
}

function renderCal(){
  document.getElementById('calMo').textContent=`${MKA[calM]} ${calY}`;
  const g=document.getElementById('calGrid'); g.innerHTML='';
  KD.forEach(d=>{const c=document.createElement('div');c.className='cc head';c.textContent=d;g.appendChild(c);});
  const firstWd=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const tdk2=todayDk();
  for(let i=0;i<firstWd;i++){const c=document.createElement('div');c.className='cc other';g.appendChild(c);}
  for(let day=1;day<=dim;day++){
    const wd=new Date(calY,calM,day).getDay();
    const dkv=dk(calY,calM+1,day);
    const isT=dkv===tdk2;
    const hasDot=Object.keys(DB).some(k=>k.includes('|'+dkv)&&(DB[k].position||DB[k].notes));
    const c=document.createElement('div');
    c.className='cc'+(iW(wd)?' wknd-c':'')+(isT?' today-c':'')+(hasDot?' has-dot':'')+(selCalDk===dkv?' active-c':'');
    c.textContent=day;
    c.onclick=()=>{selCalDk=dkv; renderCal(); showCalDay(calY,calM+1,day);};
    g.appendChild(c);
  }
}

function showCalDay(y,m,d){
  const dkv=dk(y,m,d);
  const det=document.getElementById('calDetail');
  const wd=new Date(y,m-1,d).getDay();
  const workers=WAITERS.map(w=>({...w,s:getShift(w.name,y,m,d),p:getPos(w.name,y,m,d),n:getNote(w.name,y,m,d)}))
    .filter(w=>w.s!=='OFF');

  if(!workers.length){
    det.innerHTML=`<div class="cal-detail"><div class="cal-detail-ttl">${d} ${MKA[m-1]} · ${KD[wd]}</div>
      <div style="color:var(--mu);font-size:.78rem">მუშა მიმტანი არ არის</div></div>`;
    return;
  }

  const rows=workers.map(w=>`<div class="cal-drow">
    <div class="cal-dn">${w.name}</div>
    <div class="cal-dr">
      ${w.p?`<span class="pc ${w.p}">${POS_FULL[w.p]}</span>`:''}
      <span class="drs ${scls(w.s)}">${w.s}</span>
      ${w.n?`<span style="font-size:.62rem;color:var(--mu);font-style:italic">💬 ${w.n}</span>`:''}
    </div>
  </div>`).join('');

  det.innerHTML=`<div class="cal-detail">
    <div class="cal-detail-ttl">${d} ${MKA[m-1]} · ${KD[wd]} · ${workers.length} მიმტ.</div>
    ${rows}
  </div>`;
}

/* ══════════════════════════════
   INIT
══════════════════════════════ */
async function init(){
  renderAll();
  await loadDB();
  setInterval(loadDB, 30000);
}
init();
</script>
